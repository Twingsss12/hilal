<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pemantauan Hilal LDII</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-branding">
            <div class="branding-content">
                <img src="ldii.png" alt="Logo LDII" class="logo"> <h2>Pemantauan Hilal</h2>
                <p>Sistem Informasi dan Pelaporan Hilal Terintegrasi</p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-box">
                <div class="form-header">
                    <h3>Selamat Datang</h3>
                    <p>Silakan masuk menggunakan akun Anda</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Nama Pengguna / Email</label>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Kata Sandi</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Masukkan password" required>
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Ingat Saya
                        </label>
                        <a href="#" class="forgot-password">Lupa Password?</a>
                    </div>

                    <a href="dashboard.html"><button type="submit" class="btn-login"> ke Dashboard</a></button>
                </form>

                <div class="form-footer">
                    <p>Belum punya akun? <a href="daftar.html">Daftar Sekarang</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
