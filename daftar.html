<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Pemantauan Hilal LDII</title>
    <link rel="stylesheet" href="style.css">
    <!-- Menggunakan Font Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk ikon mata pada password -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-container register-container">
        <!-- Bagian Kiri: Visual/Brand -->
        <div class="login-branding">
            <div class="branding-content">
                <img src="ldii.png" alt="Logo LDII" class="logo"> <!-- Ganti dengan URL logo asli -->
                <h2>Bergabung Bersama Kami</h2>
                <p>Daftarkan akun Anda untuk berkontribusi dalam pelaporan dan pemantauan hilal secara nasional.</p>
            </div>
        </div>

        <!-- Bagian Kanan: Form Register -->
        <div class="login-form-section">
            <div class="form-box">
                <div class="form-header">
                    <h3>Buat Akun Baru</h3>
                    <p>Lengkapi data di bawah ini dengan benar</p>
                </div>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullname">Nama Lengkap</label>
                        <input type="text" id="fullname" placeholder="Nama lengkap sesuai KTP" required>
                    </div>

                    <div class="input-group">
                        <label for="email">Alamat Email</label>
                        <input type="email" id="email" placeholder="contoh@email.com" required>
                    </div>

                    <div class="input-group">
                        <label for="instansi">Wilayah DPP / DPW/ DPD</label>
                        <input type="text" id="instansi" placeholder="Misal: DPD LDII Kota Surabaya" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Kata Sandi Baru</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Minimal 8 karakter" required>
                            <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Konfirmasi Kata Sandi</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Ulangi kata sandi" required>
                            <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                        </div>
                        <span id="passwordError" class="error-text">Kata sandi tidak cocok!</span>
                    </div>

                    <div class="form-actions terms-condition">
                        <label class="remember-me">
                            <input type="checkbox" required> Saya menyetujui <a href="#" class="forgot-password">Syarat & Ketentuan</a> yang berlaku.
                        </label>
                    </div>

                    <button type="submit" class="btn-login">Daftar Sekarang</button>
                </form>

                <div class="form-footer">
                    <p>Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
